<!-- BLOCK: statement-bold
     PURPOSE: A single giant brand assertion / manifesto line, anchored bottom-left.
       The reference decks pepper inline icon "glyphs" into the line (a music note,
       a pair of eyes) — use <span class="glyph"> for those, sparingly (0-2).
     THEMES: theme-haze (default), theme-day, theme-sabbath, theme-monday
     SLOTS:
       {kicker} optional small eyebrow, top-left
       {headline} the statement; break lines with <br>. Wrap a punch word in
         <span class="accent"> and drop <span class="glyph" style="--icon:..."> for
         an inline icon. Keep it short — this is a poster, not a paragraph.
     DENSITY: headline fills the lower half; top two-thirds is intentional space.
       NO body copy, NO cards. Let it breathe. -->
<section class="slide theme-haze">
  <div class="kicker">Why Platinumlist</div>
  <div class="statement">
    <h2 class="headline">Designed by <span class="glyph" style="--icon:url('assets/phosphor-icons/SVGs/bold/music-notes-bold.svg')"></span><br>experience-lovers.<br>For experience-makers. <span class="glyph" style="--icon:url('assets/phosphor-icons/SVGs/bold/eyes-bold.svg')"></span></h2>
  </div>
</section>
